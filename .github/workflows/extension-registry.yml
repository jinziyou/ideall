name: extension-registry

on:
  workflow_dispatch:
    inputs:
      sequence:
        description: "可选的显式递增 sequence；仅用于时钟回退恢复"
        required: false
        type: string
  schedule:
    # 目录信封默认有效 14 天；每日续签降低 runner 延迟或临时故障导致过期的风险。
    - cron: "17 3 * * *"
  push:
    branches: [main]
    paths:
      - "registry/**"
      - "scripts/extension-registry-*.mjs"
      - "scripts/release-preflight.mjs"
      - "scripts/release-publish.mjs"
      - ".github/workflows/extension-registry.yml"
      - "src-tauri/tauri.conf.json"

permissions:
  contents: write

concurrency:
  group: extension-registry-production
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # scheduled workflow 只能从仓库默认分支(dev)启动；发布源始终显式钉到稳定 main。
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
        with:
          ref: main
          persist-credentials: false
      - uses: ./.github/actions/setup-js
      - id: source
        name: Resolve publication source and clock
        run: node -e "const fs=require('node:fs'),cp=require('node:child_process'); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'sha=' + cp.execFileSync('git',['rev-parse','HEAD'],{encoding:'utf8'}).trim() + '\nnow=' + Date.now() + '\n')"
      - name: Prepare signed Registry assets
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          REGISTRY_GENERATED_AT: ${{ steps.source.outputs.now }}
          REGISTRY_SEQUENCE: ${{ inputs.sequence || steps.source.outputs.now }}
          REGISTRY_VALIDITY_DAYS: "14"
          REGISTRY_OUTPUT_DIR: registry-ready
        run: node scripts/extension-registry-artifacts.mjs prepare
      - name: Verify staged Registry assets
        env:
          REGISTRY_OUTPUT_DIR: registry-ready
        run: node scripts/extension-registry-artifacts.mjs verify
      - name: Publish through atomic Release promotion
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_OUTPUT_DIR: registry-ready
          REGISTRY_TARGET_SHA: ${{ steps.source.outputs.sha }}
        run: node scripts/extension-registry-publish.mjs
