name: app-build

# ideall 跨平台 App 构建 (Tauri 2.0)。
# 触发:
#   - 推送 app-v* tag (如 app-v0.1.0) → 正式 Release 草稿 (人工审核后发布)。
#   - 推送到 main → 滚动 edge 预发布 (tag app-edge), 永远是 main 最新可下载构建。
#   - 手动 (workflow_dispatch) → 同 edge。
# 桌面四目标经 tauri-action 出**未签名**安装包并上传到 Release; Android (仅 tag/手动) 出 debug APK 工件。
# 未签名说明: 不向 desktop job 注入 APPLE_*/TAURI_SIGNING_* env, 故 tauri 不尝试签名
#   (注: 把这些 env 设为空字符串反而会触发签名并失败, 故是"不注入"而非"传空")。
#   要出签名/可自动更新的正式包: 配好对应 secrets 后在 desktop 的 env 重新注入 (见 docs/app.md)。
# iOS 需 Apple 开发者证书/描述文件 (此处不含)。
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "app-v*"

# 创建 Release / 上传安装包需要写权限 (默认 GITHUB_TOKEN 为只读会报 "Resource not accessible")。
permissions:
  contents: write

# 静态导出把地址内联进包 (用仓库变量覆盖, Settings → Variables; 未设则回退生产默认):
#   NEXT_PUBLIC_SERVER_ADDR — 数据服务 (apiserver)。
#   NEXT_PUBLIC_EMBED_BASE  — 内嵌门户 (info/community 经 iframe 嵌入的 portal); 必须设, 否则回退 localhost。
env:
  NEXT_PUBLIC_SERVER_ADDR: ${{ vars.NEXT_PUBLIC_SERVER_ADDR || 'https://api.wonita.link' }}
  NEXT_PUBLIC_EMBED_BASE: ${{ vars.NEXT_PUBLIC_EMBED_BASE || 'https://web.wonita.link' }}

jobs:
  # 先建好唯一的 Release, 矩阵 job 仅上传 —— 规避 4 个并发 job 各自创建同一滚动 tag 的竞态。
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.rel.outputs.release_id }}
    steps:
      - uses: actions/github-script@v7
        id: rel
        with:
          script: |
            const { owner, repo } = context.repo
            const isTag = context.ref.startsWith('refs/tags/')
            const tag = isTag ? context.ref.replace('refs/tags/', '') : 'app-edge'
            let existing = null
            try {
              existing = (await github.rest.repos.getReleaseByTag({ owner, repo, tag })).data
            } catch (e) {}
            if (!isTag) {
              // 滚动 edge: 删旧 release + tag, 重建指向当前 commit、清掉旧资产。
              if (existing) {
                await github.rest.repos.deleteRelease({ owner, repo, release_id: existing.id })
                existing = null
              }
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` })
              } catch (e) {}
            }
            if (existing) {
              core.setOutput('release_id', String(existing.id))
              return
            }
            const r = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: isTag ? `ideall ${tag}` : 'ideall (edge · main 最新构建)',
              body: isTag ? '' : `main 分支自动构建 · ${context.sha}`,
              draft: isTag,
              prerelease: !isTag,
            })
            core.setOutput('release_id', String(r.data.id))

  desktop:
    needs: create-release
    name: desktop (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: macos-latest, label: macos-arm64, args: "--target aarch64-apple-darwin" }
          - { platform: macos-latest, label: macos-x64, args: "--target x86_64-apple-darwin" }
          - { platform: ubuntu-22.04, label: linux-x64, args: "" }
          - { platform: windows-latest, label: windows-x64, args: "" }
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux WebKit deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - run: pnpm install --frozen-lockfile

      # tauri-action 跑 beforeBuildCommand (pnpm app:export 静态导出) + tauri build, 把产物
      # (.dmg/.app, .deb/.rpm/.AppImage, .msi/.exe) 上传到上面建好的 Release (releaseId, 仅上传不创建)。
      # 未签名: env 不含 APPLE_*/TAURI_SIGNING_* → 不触发签名。
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          releaseId: ${{ needs.create-release.outputs.release_id }}

  android:
    name: android (debug apk)
    # 仅 tag / 手动时出 APK (main 每次推送不打 Android, 省 CI)。
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: sdkmanager "ndk;26.1.10909125"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      - run: pnpm install --frozen-lockfile
      # gen/android 不入库, CI 现场初始化后构建 debug APK (release 需 keystore 签名, 见 docs/app.md)。
      - name: Init + build Android (debug)
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
        run: |
          pnpm tauri android init --ci
          pnpm tauri android build --debug --apk
      - uses: actions/upload-artifact@v4
        with:
          name: ideall-android-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
