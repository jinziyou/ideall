name: app-build

# ideall 跨平台 App 构建 (Tauri 2.0)。
# 触发:
#   - 推送 app-v* tag (如 app-v0.1.0) → 正式 Release 草稿 (人工审核后发布)。
#   - 推送到 main → 滚动 edge 预发布 (tag app-edge), 永远是 main 最新可下载构建。
#   - 手动 (workflow_dispatch) → 同 edge。
# 桌面四目标经 tauri-action 出**未签名**安装包并上传到 Release; Android (仅 tag/手动) 出 debug APK 工件。
# 未签名说明: 不向 desktop job 注入 APPLE_*/TAURI_SIGNING_* env, 故 tauri 不尝试签名
#   (注: 把这些 env 设为空字符串反而会触发签名并失败, 故是"不注入"而非"传空")。
#   要出签名/可自动更新的正式包: 配好对应 secrets 后在 desktop 的 env 重新注入 (见 docs/app.md)。
# iOS 需 Apple 开发者证书/描述文件 (此处不含)。
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "app-v*"

# 创建 Release / 上传安装包需要写权限 (默认 GITHUB_TOKEN 为只读会报 "Resource not accessible")。
permissions:
  contents: write

# 静态导出把地址内联进包 (用仓库变量覆盖, Settings → Variables; 未设则回退生产默认):
#   NEXT_PUBLIC_SERVER_ADDR — 数据服务 (apiserver)。
#   NEXT_PUBLIC_EMBED_BASE  — 内嵌门户 (info/community 经 iframe 嵌入的 portal); 未设则回退 https://www.wonita.link (须在 tauri.conf.json CSP frame-src 白名单内)。
env:
  NEXT_PUBLIC_SERVER_ADDR: ${{ vars.NEXT_PUBLIC_SERVER_ADDR || 'https://api.wonita.link' }}
  NEXT_PUBLIC_EMBED_BASE: ${{ vars.NEXT_PUBLIC_EMBED_BASE || 'https://www.wonita.link' }}

jobs:
  # 判定是否构建: tag / 手动 → 总是; main 推送 → 仅当本次改动含"非文档/非配置"文件才构建
  # (纯文档 docs/*.md / CI 配置 / .prettier* 等提交跳过全平台构建, 省 CI)。
  gate:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.decide.outputs.build }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
      # 发版前置卡点: app-v* tag 必须与三处版本号一致 —— tauri-action 按 tauri.conf.json 的 version
      # 生成 latest.json, 不一致会让桌面自动更新判定"无更新"且 Release 与产物版本错配。
      - name: Tag 版本一致性检查 (app-v* 与 tauri.conf.json / package.json / Cargo.toml)
        if: github.ref_type == 'tag'
        run: |
          TAG_VER="${GITHUB_REF_NAME#app-v}"
          CONF_VER="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          PKG_VER="$(node -p "require('./package.json').version")"
          CARGO_VER="$(grep -m1 '^version' src-tauri/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')"
          if [ "$TAG_VER" != "$CONF_VER" ] || [ "$TAG_VER" != "$PKG_VER" ] || [ "$TAG_VER" != "$CARGO_VER" ]; then
            echo "::error::tag app-v$TAG_VER 与版本号不一致: tauri.conf.json=$CONF_VER / package.json=$PKG_VER / Cargo.toml=$CARGO_VER —— 打 tag 前先 bump 三处 (见 docs/app.md 发版流程)"
            exit 1
          fi
          echo "版本一致: $TAG_VER"
      - id: decide
        run: |
          if [ "${{ github.ref_type }}" = "tag" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # 首提交 / 浅历史无父提交时无从 diff → 保守起见直接构建。
          if ! git rev-parse -q --verify HEAD^ >/dev/null 2>&1; then
            echo "无父提交 (首提交/浅历史) → 构建"
            echo "build=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # 捕获"非文档/配置"改动再判非空 (不用 grep -q, 避免其在管道下的早退/SIGPIPE 怪异退出码)。
          app="$(git diff --name-only HEAD^ HEAD | grep -vE '^(docs/|LICENSE$|.*\.md$|\.github/|\.gitignore$|\.prettierignore$|\.prettierrc.*|\.editorconfig$)' || true)"
          if [ -n "$app" ]; then
            echo "含应用改动, 构建:"; printf '  %s\n' "$app"
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "仅文档/配置改动 → 跳过 App 构建"
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

  # 先建好唯一的 Release, 矩阵 job 仅上传 —— 规避 4 个并发 job 各自创建同一滚动 tag 的竞态。
  create-release:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.rel.outputs.release_id }}
    steps:
      - uses: actions/github-script@v7
        id: rel
        with:
          script: |
            const { owner, repo } = context.repo
            const isTag = context.ref.startsWith('refs/tags/')
            const tag = isTag ? context.ref.replace('refs/tags/', '') : 'app-edge'
            let existing = null
            try {
              existing = (await github.rest.repos.getReleaseByTag({ owner, repo, tag })).data
            } catch (e) {}
            if (!isTag) {
              // 滚动 edge: 删旧 release + tag, 重建指向当前 commit、清掉旧资产。
              if (existing) {
                await github.rest.repos.deleteRelease({ owner, repo, release_id: existing.id })
                existing = null
              }
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` })
              } catch (e) {}
            }
            if (existing) {
              core.setOutput('release_id', String(existing.id))
              return
            }
            const r = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: isTag ? `ideall ${tag}` : 'ideall (edge · main 最新构建)',
              body: isTag ? '' : `main 分支自动构建 · ${context.sha}`,
              draft: isTag,
              prerelease: !isTag,
            })
            core.setOutput('release_id', String(r.data.id))

  desktop:
    needs: [gate, create-release]
    if: needs.gate.outputs.build == 'true'
    name: desktop (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: macos-latest, label: macos-arm64, args: "--target aarch64-apple-darwin" }
          - { platform: macos-latest, label: macos-x64, args: "--target x86_64-apple-darwin" }
          - { platform: ubuntu-22.04, label: linux-x64, args: "" }
          - { platform: windows-latest, label: windows-x64, args: "" }
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux WebKit deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - run: pnpm install --frozen-lockfile

      # tauri-action 跑 beforeBuildCommand (pnpm app:export 静态导出) + tauri build, 把安装包
      # (.dmg/.app, .deb/.rpm/.AppImage, .msi/.exe) + 自动更新产物 (.sig, latest.json) 上传到 Release。
      # TAURI_SIGNING_*: updater 的 minisign 私钥+密码 (来自 secret) → 签名更新产物; 缺失则不出 .sig。
      # 仍不注入 APPLE_*/Windows 证书 → OS 代码签名未启用 (出未签名安装包; 见 ① / docs/app.md)。
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          releaseId: ${{ needs.create-release.outputs.release_id }}

  android:
    name: android (debug apk)
    # 仅 tag / 手动时出 APK (main 每次推送不打 Android, 省 CI)。
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: sdkmanager "ndk;26.1.10909125"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      - run: pnpm install --frozen-lockfile
      # gen/android 不入库, CI 现场初始化后构建 debug APK (release 需 keystore 签名, 见 docs/app.md)。
      - name: Init + build Android (debug)
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
        run: |
          pnpm tauri android init --ci
          pnpm tauri android build --debug --apk
      - uses: actions/upload-artifact@v4
        with:
          name: ideall-android-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

  # ③ 桌面包上传完后, 生成 SHA256SUMS 并挂回同一 Release, 供下载者校验完整性。
  checksums:
    needs: [gate, desktop]
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - id: meta
        run: |
          TAG=$([ "$GITHUB_REF_TYPE" = "tag" ] && echo "$GITHUB_REF_NAME" || echo "app-edge")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: 下载 Release 资产
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${{ steps.meta.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --dir dist --clobber
      - name: 生成 SHA256SUMS
        run: |
          cd dist
          rm -f SHA256SUMS
          sha256sum * | tee ../SHA256SUMS
      - name: 上传 SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.meta.outputs.tag }}" SHA256SUMS --repo "$GITHUB_REPOSITORY" --clobber
