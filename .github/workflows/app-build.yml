name: app-build

# ideall 跨平台 App 构建 (Tauri 2.0)。
# 触发:
#   - 推送 app-v* tag (如 app-v0.1.0) → 正式 Release 草稿 (人工审核后发布)。
#   - 推送到 main → 滚动 edge 预发布 (tag app-edge), 永远是 main 最新可下载构建。
#   - 手动 (workflow_dispatch) → 同 edge。
# 桌面四目标经 tauri-action 出安装包并挂到 GitHub Release; Android (仅 tag/手动) 出 debug APK 工件。
# iOS 需 Apple 开发者证书/描述文件, 见 docs/app.md (此处不含, 避免无证书空跑)。
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "app-v*"

# 静态导出把地址内联进包 (用仓库变量覆盖, Settings → Variables; 未设则回退生产默认):
#   NEXT_PUBLIC_SERVER_ADDR — 数据服务 (apiserver)。
#   NEXT_PUBLIC_EMBED_BASE  — 内嵌门户 (info/community 经 iframe 嵌入的 portal); 必须设, 否则回退 localhost。
env:
  NEXT_PUBLIC_SERVER_ADDR: ${{ vars.NEXT_PUBLIC_SERVER_ADDR || 'https://api.wonita.link' }}
  NEXT_PUBLIC_EMBED_BASE: ${{ vars.NEXT_PUBLIC_EMBED_BASE || 'https://web.wonita.link' }}

jobs:
  desktop:
    name: desktop (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: macos-latest, label: macos-arm64, args: "--target aarch64-apple-darwin" }
          - { platform: macos-latest, label: macos-x64, args: "--target x86_64-apple-darwin" }
          - { platform: ubuntu-22.04, label: linux-x64, args: "" }
          - { platform: windows-latest, label: windows-x64, args: "" }
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux WebKit deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - run: pnpm install --frozen-lockfile

      # tauri-action 自动跑 beforeBuildCommand (pnpm app:export → 静态导出) 再 tauri build,
      # 并把产物 (.dmg/.app, .deb/.rpm/.AppImage, .msi/.exe) 上传到 Release 草稿。
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 自动更新签名 (产物 .sig + latest.json); 未设则不签更新。见 docs/app.md «Phase 3»。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS 代码签名 + 公证; 未设则出未签名 .app/.dmg (本地可跑, 对外分发会被 Gatekeeper 拦)。
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: ${{ matrix.args }}
          # tag 推送 → 正式 Release 草稿 (人工发布); main 推送/手动 → 滚动 edge 预发布 (直接可下载)。
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'app-edge' }}
          releaseName: ${{ github.ref_type == 'tag' && format('ideall {0}', github.ref_name) || 'ideall (edge · main 最新构建)' }}
          releaseBody: ${{ github.ref_type == 'tag' && '' || format('main 分支自动构建 · commit {0}', github.sha) }}
          releaseDraft: ${{ github.ref_type == 'tag' }}
          prerelease: ${{ github.ref_type != 'tag' }}

  android:
    name: android (debug apk)
    # 仅 tag / 手动时出 APK (main 每次推送不打 Android, 省 CI)。
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: sdkmanager "ndk;26.1.10909125"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      - run: pnpm install --frozen-lockfile
      # gen/android 不入库, CI 现场初始化后构建 debug APK (release 需 keystore 签名, 见 docs/app.md)。
      - name: Init + build Android (debug)
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
        run: |
          pnpm tauri android init --ci
          pnpm tauri android build --debug --apk
      - uses: actions/upload-artifact@v4
        with:
          name: ideall-android-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
