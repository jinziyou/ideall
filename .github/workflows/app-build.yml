name: app-build

# ideall 跨平台 App 构建 (Tauri 2.0)。
# 触发:
#   - 推送 app-v* tag (如 app-v0.1.0) → 正式 Release 草稿 (人工审核后发布)。
#   - 推送到 main → 滚动 edge 预发布 (tag app-edge), 永远是 main 最新可下载构建。
#   - 从 main 手动运行 (workflow_dispatch) → 同 edge；其他分支由 gate 拒绝。
# 桌面四目标经 tauri-action 出 OS 未签名安装包和 minisign updater 产物，先进入短期
# workflow artifacts；四平台齐全且元数据校验通过后才由单一 publish job 切换 Release。
# APPLE_*/Windows 代码签名证书尚未注入，因此操作系统仍会把安装包视为未签名。
# iOS 需 Apple 开发者证书/描述文件 (此处不含)。
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "app-v*"

# 默认只读；仅最终 staging / Release 切换 job 单独提升写权限。
permissions:
  contents: read

concurrency:
  # 所有非 tag 构建都写同一个 app-edge 通道，必须跨分支/手动任务串行；正式 tag 各自独立。
  group: app-build-${{ github.ref_type == 'tag' && github.ref_name || 'app-edge' }}
  cancel-in-progress: false

# 静态导出把地址内联进包 (用仓库变量覆盖, Settings → Variables; 未设则回退生产默认):
#   NEXT_PUBLIC_SERVER_ADDR — 数据服务 (apiserver)。
#   NEXT_PUBLIC_EMBED_BASE  — 内嵌门户 (info/community 经 iframe 嵌入的 portal); 未设则回退 https://www.wonita.link (须在 tauri.conf.json CSP frame-src 白名单内)。
env:
  NEXT_PUBLIC_SERVER_ADDR: ${{ vars.NEXT_PUBLIC_SERVER_ADDR || 'https://api.wonita.link' }}
  NEXT_PUBLIC_EMBED_BASE: ${{ vars.NEXT_PUBLIC_EMBED_BASE || 'https://www.wonita.link' }}

jobs:
  # 判定是否构建: tag / main 手动 → 总是; main 推送 → 仅当本次改动含应用或发布链文件才构建。
  # 纯文档、非发布 workflow 与格式配置跳过；app-build 本身和共享 setup action 必须触发构建。
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      build: ${{ steps.decide.outputs.build }}
      rust: ${{ steps.decide.outputs.rust }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # main push 要比较 event.before..sha 的完整推送范围，而不是只看最后一个 commit。
          fetch-depth: 0
          persist-credentials: false
      # 发版前置卡点: app-v* tag 必须与四处版本号一致 —— tauri-action 按 tauri.conf.json 的 version
      # 生成 latest.json, 不一致会让桌面自动更新判定"无更新"且 Release 与产物版本错配。
      - name: Tag 版本一致性检查
        if: github.ref_type == 'tag'
        run: |
          TAG_VER="${GITHUB_REF_NAME#app-v}"
          node scripts/check-version.mjs "$TAG_VER"
      - id: decide
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: node scripts/app-build-gate.mjs

  preflight:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify release tag belongs to main
        if: github.ref_type == 'tag'
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "::error::正式 app-v* tag 必须指向 main 已包含的提交"
            exit 1
          fi
      - uses: ./.github/actions/setup-js
      - name: Verify release configuration and updater signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: node scripts/release-preflight.mjs
      - name: Verify JavaScript quality gates
        run: pnpm verify:checks
      - name: Install Linux WebKit deps
        if: needs.gate.outputs.rust == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        if: needs.gate.outputs.rust == 'true'
        with:
          components: clippy,rustfmt
      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: needs.gate.outputs.rust == 'true'
        with:
          workspaces: ./src-tauri -> target
      - name: Verify Rust quality gates
        if: needs.gate.outputs.rust == 'true'
        working-directory: src-tauri
        run: |
          mkdir -p ../out
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings
          cargo test

  desktop:
    needs: [gate, preflight]
    if: needs.gate.outputs.build == 'true'
    name: desktop (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: macos-15, label: macos-arm64, args: "--target aarch64-apple-darwin" }
          - { platform: macos-15, label: macos-x64, args: "--target x86_64-apple-darwin" }
          - { platform: ubuntu-22.04, label: linux-x64, args: "" }
          - { platform: windows-latest, label: windows-x64, args: "" }
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Linux WebKit deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: ./.github/actions/setup-js
      - name: Restore Next cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-${{ matrix.label }}-next-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**', 'public/**', 'next.config.ts', 'tsconfig.json', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.label }}-next-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-${{ matrix.label }}-next-

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.platform == 'macos-15' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ./src-tauri -> target

      # 只构建、不接触 Release。完整 artifactPaths 由确定性脚本暂存为 workflow artifact；
      # 所有平台成功并通过签名/元数据校验后，publish job 才会创建或切换 Release。
      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        id: tauri-build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          uploadUpdaterJson: false
      - name: Stage desktop artifacts
        env:
          RELEASE_LABEL: ${{ matrix.label }}
          RELEASE_VERSION: ${{ steps.tauri-build.outputs.appVersion }}
          RELEASE_STAGE_DIR: release-stage
          TAURI_ARTIFACT_PATHS: ${{ steps.tauri-build.outputs.artifactPaths }}
        run: node scripts/release-artifacts.mjs stage
      - name: Upload staged desktop artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: desktop-${{ matrix.label }}
          path: release-stage
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  android:
    name: android (debug apk)
    # 仅 tag / 手动时出 APK (main 每次推送不打 Android, 省 CI)。
    needs: [gate, preflight]
    if: needs.gate.outputs.build == 'true' && (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-22.04
    timeout-minutes: 75
    env:
      ANDROID_NDK_VERSION: 26.1.10909125
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-js
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
      - name: Resolve Android NDK path
        id: android-ndk
        shell: bash
        run: echo "path=$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION" >> "$GITHUB_OUTPUT"
      - name: Restore Android NDK cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ${{ steps.android-ndk.outputs.path }}
          key: ${{ runner.os }}-android-ndk-${{ env.ANDROID_NDK_VERSION }}
      - name: Install Android NDK
        env:
          NDK_HOME: ${{ steps.android-ndk.outputs.path }}
        run: |
          if [ ! -d "$NDK_HOME" ]; then
            sdkmanager "ndk;$ANDROID_NDK_VERSION"
          fi
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ./src-tauri -> target
      - name: Restore Next cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-android-next-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**', 'public/**', 'next.config.ts', 'tsconfig.json', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-android-next-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-android-next-
      # gen/android 不入库, CI 现场初始化后构建 debug APK (release 需 keystore 签名, 见 docs/app.md)。
      - name: Init + build Android (debug)
        env:
          NDK_HOME: ${{ steps.android-ndk.outputs.path }}
        run: |
          test -d "$NDK_HOME"
          pnpm tauri android init --ci
          pnpm tauri android build --debug --apk
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ideall-android-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

  publish:
    name: validate and publish desktop release
    needs: [gate, preflight, desktop]
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: desktop-*
          path: release-input
      - id: release-meta
        name: Resolve release metadata
        run: |
          VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          TAG=$([ "$GITHUB_REF_TYPE" = "tag" ] && echo "$GITHUB_REF_NAME" || echo "app-edge")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Validate and aggregate desktop artifacts
        env:
          RELEASE_INPUT_DIR: release-input
          RELEASE_OUTPUT_DIR: release-ready
          RELEASE_VERSION: ${{ steps.release-meta.outputs.version }}
          RELEASE_TAG: ${{ steps.release-meta.outputs.tag }}
          RELEASE_NOTES: ${{ github.ref_type == 'tag' && '' || format('main 分支自动构建 · {0}', github.sha) }}
        run: node scripts/release-artifacts.mjs prepare
      - name: Publish staged release and switch channel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_OUTPUT_DIR: release-ready
        run: node scripts/release-publish.mjs
