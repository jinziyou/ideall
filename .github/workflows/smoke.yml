name: smoke

# 冒烟门: 真浏览器驱动关键本地优先链路 (notes + files IDE + plugins + trash)。
# 测的是**生产形态** —— 静态导出 (out/) 经 scripts/serve-out.mjs 提供,
# 与 App 实际分发一致 (deep-link/.html 解析回归也在覆盖内), 不再依赖 dev 服。
# PR 跑 files core 链路快速挡回归; push / 定时跑 files full 矩阵覆盖主流预览类型。
# paths 过滤: 仅应用面改动才跑 (纯文档改动不烧浏览器分钟数)。
on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.ts"
      - "tsconfig.json"
      - "scripts/smoke-lib.mjs"
      - "scripts/smoke-notes.mjs"
      - "scripts/smoke-files.mjs"
      - "scripts/smoke-files-preview.mjs"
      - "scripts/smoke-plugins.mjs"
      - "scripts/smoke-plugins/**"
      - "scripts/smoke-trash.mjs"
      - "scripts/check-static-export.mjs"
      - "scripts/verify-full.mjs"
      - "scripts/verify-static-smoke.mjs"
      - "scripts/serve-out.mjs"
      - ".github/workflows/smoke.yml"
  push:
    branches: [main, dev]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.ts"
      - "tsconfig.json"
      - "scripts/smoke-lib.mjs"
      - "scripts/smoke-notes.mjs"
      - "scripts/smoke-files.mjs"
      - "scripts/smoke-files-preview.mjs"
      - "scripts/smoke-plugins.mjs"
      - "scripts/smoke-plugins/**"
      - "scripts/smoke-trash.mjs"
      - "scripts/check-static-export.mjs"
      - "scripts/verify-full.mjs"
      - "scripts/verify-static-smoke.mjs"
      - "scripts/serve-out.mjs"
      - ".github/workflows/smoke.yml"
  schedule:
    - cron: "17 19 * * 0"
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-static:
    name: build static export
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Restore Next cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**', 'public/**', 'next.config.ts', 'tsconfig.json', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-next-
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build static export
        run: pnpm build
      - name: Upload static export
        uses: actions/upload-artifact@v4
        with:
          name: static-export
          path: out
          if-no-files-found: error
          retention-days: 1

  smoke:
    name: smoke / ${{ matrix.name }}
    needs: build-static
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: notes
            script: smoke:notes
          - name: files
            script: smoke:files
          - name: plugins
            script: smoke:plugins
          - name: trash
            script: smoke:trash
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Restore Playwright cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
      - name: Download static export
        uses: actions/download-artifact@v4
        with:
          name: static-export
          path: out
      - name: Run static smoke
        run: node scripts/verify-static-smoke.mjs --no-build ${{ matrix.script }}
        env:
          SMOKE_LEVEL: ${{ github.event_name == 'pull_request' && 'core' || 'full' }}
      - name: 上传截图 (失败排查用)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots-${{ matrix.name }}
          path: |
            /tmp/notes-smoke
            /tmp/files-smoke
            /tmp/plugins-smoke
            /tmp/trash-smoke
          if-no-files-found: ignore
