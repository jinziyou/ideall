name: smoke

# 冒烟门: 真浏览器驱动关键本地优先链路 (notes + files IDE + plugins + trash)。
# 测的是**生产形态** —— 静态导出 (out/) 经 scripts/serve-out.mjs 提供,
# 与 App 实际分发一致 (deep-link/.html 解析回归也在覆盖内), 不再依赖 dev 服。
# PR 跑 files core 链路快速挡回归; push / 定时跑 files full 矩阵覆盖主流预览类型。
# paths 过滤: 仅应用面改动才跑 (纯文档改动不烧浏览器分钟数)。
on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.ts"
      - "tsconfig.json"
      - "scripts/smoke/**"
      - "scripts/lib/process.mjs"
      - "scripts/check-static-export.mjs"
      - "scripts/verify-full.mjs"
      - "scripts/verify-static-smoke.mjs"
      - "scripts/serve-out.mjs"
      - ".github/actions/setup-js/**"
      - ".github/actions/setup-next-cache/**"
      - ".github/workflows/smoke.yml"
  push:
    branches: [main, dev]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.ts"
      - "tsconfig.json"
      - "scripts/smoke/**"
      - "scripts/lib/process.mjs"
      - "scripts/check-static-export.mjs"
      - "scripts/verify-full.mjs"
      - "scripts/verify-static-smoke.mjs"
      - "scripts/serve-out.mjs"
      - ".github/actions/setup-js/**"
      - ".github/actions/setup-next-cache/**"
      - ".github/workflows/smoke.yml"
  schedule:
    - cron: "17 19 * * 0"
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-static:
    name: build static export
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-js
      - uses: ./.github/actions/setup-next-cache
      - name: Build static export
        run: pnpm build
      - name: Upload static export
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: static-export
          path: out
          if-no-files-found: error
          retention-days: 1

  smoke:
    name: smoke / ${{ matrix.name }}
    needs: build-static
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: notes
            script: smoke:notes
          - name: files
            script: smoke:files
          - name: plugins
            script: smoke:plugins
          - name: trash
            script: smoke:trash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-js
      - name: Restore Playwright cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
      - name: Download static export
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: static-export
          path: out
      - name: Run static smoke
        run: node scripts/verify-static-smoke.mjs --no-build ${{ matrix.script }}
        env:
          SMOKE_LEVEL: ${{ github.event_name == 'pull_request' && 'core' || 'full' }}
      - name: 上传截图 (失败排查用)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-screenshots-${{ matrix.name }}
          path: |
            /tmp/notes-smoke
            /tmp/files-smoke
            /tmp/plugins-smoke
            /tmp/trash-smoke
          if-no-files-found: ignore
