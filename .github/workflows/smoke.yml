name: smoke

# 冒烟门: 真浏览器驱动关键本地优先链路 (notes + files IDE)。
# 测的是**生产形态** —— 静态导出 (out/) 经 scripts/serve-out.mjs 提供,
# 与 App 实际分发一致 (deep-link/.html 解析回归也在覆盖内), 不再依赖 dev 服。
# PR 跑 files core 链路快速挡回归; push / 定时跑 files full 矩阵覆盖主流预览类型。
# paths 过滤: 仅应用面改动才跑 (纯文档改动不烧浏览器分钟数)。
on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.ts"
      - "tsconfig.json"
      - "scripts/smoke-lib.mjs"
      - "scripts/smoke-notes.mjs"
      - "scripts/smoke-files.mjs"
      - "scripts/smoke-plugins.mjs"
      - "scripts/serve-out.mjs"
      - ".github/workflows/smoke.yml"
  push:
    branches: [main, dev]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.ts"
      - "tsconfig.json"
      - "scripts/smoke-lib.mjs"
      - "scripts/smoke-notes.mjs"
      - "scripts/smoke-files.mjs"
      - "scripts/smoke-plugins.mjs"
      - "scripts/serve-out.mjs"
      - ".github/workflows/smoke.yml"
  schedule:
    - cron: "17 19 * * 0"
  workflow_dispatch:

jobs:
  smoke:
    name: workspace e2e (静态导出)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
      - name: Build (static export)
        run: pnpm build
      - name: Serve out/
        run: |
          node scripts/serve-out.mjs > /tmp/serve.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf --max-time 5 http://localhost:5030/home/notes > /dev/null && exit 0
            sleep 1
          done
          echo "静态服 30s 未就绪"; cat /tmp/serve.log; exit 1
      - name: Smoke (notes e2e)
        run: BASE=http://localhost:5030 pnpm smoke:notes
      - name: Smoke (plugins core)
        run: BASE=http://localhost:5030 pnpm smoke:plugins
      - name: Smoke (files e2e core)
        if: github.event_name == 'pull_request'
        run: SMOKE_LEVEL=core BASE=http://localhost:5030 pnpm smoke:files
      - name: Smoke (files e2e full)
        if: github.event_name != 'pull_request'
        run: SMOKE_LEVEL=full BASE=http://localhost:5030 pnpm smoke:files
      - name: 上传截图 (失败排查用)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: |
            /tmp/notes-smoke
            /tmp/files-smoke
            /tmp/plugins-smoke
          if-no-files-found: ignore
