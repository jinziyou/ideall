name: rust

# Rust 门 (src-tauri): clippy 零警告 + 单元测试。
# paths 过滤: 仅 src-tauri 改动才跑 (省 CI 分钟数; 首跑冷缓存 ~7min, rust-cache 后显著缩短)。
on:
  pull_request:
    paths:
      - "src-tauri/**"
      - ".github/workflows/rust.yml"
  push:
    branches: [main, dev]
    paths:
      - "src-tauri/**"
      - ".github/workflows/rust.yml"

jobs:
  rust:
    name: clippy + cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux WebKit deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      # tauri::generate_context! 编译期嵌入 frontendDist(../out) 资产; 此 job 不构建前端, 给空目录即可编译。
      - name: Stub frontend dist
        run: mkdir -p out
      - name: Clippy (警告即失败)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - name: Test
        run: cargo test
        working-directory: src-tauri
