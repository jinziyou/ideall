name: rust

# Rust 门 (src-tauri): Linux 跑 rustfmt + clippy + 全量测试；Windows/macOS 低成本编译全部 targets。
# paths 过滤: 仅 src-tauri 改动才跑 (省 CI 分钟数; 首跑冷缓存 ~7min, rust-cache 后显著缩短)。
on:
  pull_request:
    paths:
      - "src-tauri/**"
      - ".github/workflows/rust.yml"
  push:
    branches: [main, dev]
    paths:
      - "src-tauri/**"
      - ".github/workflows/rust.yml"
  workflow_dispatch:

concurrency:
  group: rust-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: cargo fmt + check + clippy + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Linux WebKit deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy,rustfmt
      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ./src-tauri -> target
      # tauri::generate_context! 编译期嵌入 frontendDist(../out) 资产; 此 job 不构建前端, 给空目录即可编译。
      - name: Stub frontend dist
        run: mkdir -p out
      - name: Format
        run: cargo fmt --all -- --check
        working-directory: src-tauri
      - name: Check
        run: cargo check --all-targets
        working-directory: src-tauri
      - name: Clippy (警告即失败)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - name: Test
        run: cargo test
        working-directory: src-tauri

  platform-check:
    name: cargo check (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-15
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ./src-tauri -> target
      # tauri::generate_context! 在所有宿主平台都会读取 frontendDist=../out。
      - name: Stub frontend dist
        shell: bash
        run: mkdir -p out
      - name: Check all targets
        run: cargo check --all-targets
        working-directory: src-tauri
