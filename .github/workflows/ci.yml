name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  check:
    name: lint + typecheck + format + test + contract + export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint (含依赖边界强制)
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Format check
        run: pnpm format:check
      - name: Test
        run: pnpm test
      # server.d.ts 与 openapi/server.json 一致性 (改了 schema 忘重生成会在此失败)
      - name: API contract
        run: pnpm gen:api:check
      # 静态导出守门 (App-only 唯一生产构建; 导出回归会在此失败)
      - name: Build (static export)
        run: pnpm build

# 另两道门拆在独立工作流 (带 paths 过滤, 省 CI 分钟数):
#   rust.yml  — clippy 零警告 + cargo test (仅 src-tauri/** 改动时跑)
#   smoke.yml — 笔记链路真浏览器冒烟, 测静态导出生产形态 (仅应用面改动时跑)
