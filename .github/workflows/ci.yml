name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  check:
    name: lint + typecheck + format + test + contract + export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint (含依赖边界强制)
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Format check
        run: pnpm format:check
      - name: Test
        run: pnpm test
      # server.d.ts 与 openapi/server.json 一致性 (改了 schema 忘重生成会在此失败)
      - name: API contract
        run: pnpm gen:api:check
      # 静态导出守门 (App-only 唯一生产构建; 导出回归会在此失败)
      - name: Build (static export)
        run: pnpm build

  # Rust 门 (src-tauri): clippy 零警告 + 单元测试。此前 CI 不跑 Rust,
  # clippy 警告与挂掉的测试长期无人知晓 —— 此 job 锁住清零状态。
  rust:
    name: clippy + cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux WebKit deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      # tauri::generate_context! 编译期嵌入 frontendDist(../out) 资产; 此 job 不构建前端, 给空目录即可编译。
      - name: Stub frontend dist
        run: mkdir -p out
      - name: Clippy (警告即失败)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - name: Test
        run: cargo test
        working-directory: src-tauri
