name: CI

on:
  pull_request:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: base verification
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Verify base
        run: pnpm verify:base

# 另两道门拆在独立工作流 (带 paths 过滤, 省 CI 分钟数):
#   rust.yml  — clippy 零警告 + cargo test (仅 src-tauri/** 改动时跑)
#   smoke.yml — 笔记链路真浏览器冒烟, 测静态导出生产形态 (仅应用面改动时跑)
