name: CI

on:
  pull_request:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-js
      - name: Run quality checks
        run: pnpm verify:checks
      - name: Upload core coverage
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: core-coverage
          path: node_modules/.cache/ideall/coverage
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-js
      - uses: ./.github/actions/setup-next-cache
      - name: Build
        run: pnpm app:export

# 另两道门拆在独立工作流 (带 paths 过滤, 省 CI 分钟数):
#   rust.yml  — clippy 零警告 + cargo test (仅 src-tauri/** 改动时跑)
#   smoke.yml — 真浏览器冒烟, 测静态导出生产形态 (仅应用面改动时跑)
