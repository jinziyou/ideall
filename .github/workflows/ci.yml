name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  check:
    name: lint + typecheck + format + test + contract + export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint (含依赖边界强制)
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Format check
        run: pnpm format:check
      - name: Test
        run: pnpm test
      # server.d.ts 与 openapi/server.json 一致性 (改了 schema 忘重生成会在此失败)
      - name: API contract
        run: pnpm gen:api:check
      # 静态导出守门 (App-only 唯一生产构建; 导出回归会在此失败)
      - name: Build (static export)
        run: pnpm build

  # 冒烟门: 真浏览器驱动笔记链路 (新建→输入→slash 菜单→自动保存→刷新持久化)。
  # 挡「构建通过但页面白屏/水合失败」这类静态门看不见的回归。dev 服起在后台, 步骤间进程存活。
  smoke:
    name: smoke (notes e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
      - name: Start dev server
        run: |
          pnpm dev > /tmp/dev.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf --max-time 10 http://localhost:5020/home/notes > /dev/null && exit 0
            sleep 2
          done
          echo "dev 服 120s 未就绪"; tail -50 /tmp/dev.log; exit 1
      - name: Smoke (notes e2e)
        run: pnpm smoke:notes
      - name: 上传截图 (失败排查用)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: notes-smoke-screenshots
          path: /tmp/notes-smoke
          if-no-files-found: ignore

  # Rust 门 (src-tauri): clippy 零警告 + 单元测试。此前 CI 不跑 Rust,
  # clippy 警告与挂掉的测试长期无人知晓 —— 此 job 锁住清零状态。
  rust:
    name: clippy + cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux WebKit deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      # tauri::generate_context! 编译期嵌入 frontendDist(../out) 资产; 此 job 不构建前端, 给空目录即可编译。
      - name: Stub frontend dist
        run: mkdir -p out
      - name: Clippy (警告即失败)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - name: Test
        run: cargo test
        working-directory: src-tauri
