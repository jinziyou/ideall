name: Restore Next.js cache
description: Restore the repository's Next.js build cache with an optional platform variant.

inputs:
  variant:
    description: Optional cache-key segment, such as a release platform label.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Restore Next cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: .next/cache
        key: ${{ runner.os }}-${{ inputs.variant }}next-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**', 'public/**', 'next.config.ts', 'tsconfig.json', 'package.json') }}
        restore-keys: |
          ${{ runner.os }}-${{ inputs.variant }}next-${{ hashFiles('pnpm-lock.yaml') }}-
          ${{ runner.os }}-${{ inputs.variant }}next-
