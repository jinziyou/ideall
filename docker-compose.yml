# 自包含：peer。在 peer 下: docker compose up --build
name: myos

services:
  myos:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${MYOS_PORT:-3000}:3000"
    environment:
      - SERVER_ADDR=${MYOS_SERVER_ADDR:-http://server:3001}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://127.0.0.1:3000'', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on(''error'', () => process.exit(1));"',
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

networks:
  default:
    name: ${WONITA_NETWORK:-wonita_net}
    external: true
