# 可选叠加层：当 myos 与 Wonita 后端部署在同一台机器、需共用一张已存在的外部网络时使用。
#
# 用法（任选其一）：
#   A) 复制为 docker-compose.override.yml —— `docker compose up` 会自动合并：
#        cp docker-compose.override.example.yml docker-compose.override.yml
#   B) 显式指定：
#        docker compose -f docker-compose.yml -f docker-compose.override.example.yml up -d --build
#
# 前置：该外部网络须已由后端编排创建（或手动 `docker network create <name>`）。
# 默认通过 docker 服务名 `server` 直连同网后端（按你的后端服务名调整）。

services:
  myos:
    environment:
      - SERVER_ADDR=${MYOS_SERVER_ADDR:-http://server:5021}

networks:
  default:
    name: ${MYOS_NETWORK:-wonita_net}
    external: true
