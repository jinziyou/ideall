[package]
name = "ideall"
version = "0.1.0"
description = "ideall — Wonita 用户客户端 (Tauri 外壳)"
authors = ["ideall contributors"]
edition = "2021"
rust-version = "1.77.2"

# 库 crate 供桌面/移动两种入口共用 (移动端需 cdylib)。
[lib]
name = "ideall_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
# HTTP: App 内经 Rust 侧请求绕过浏览器 CORS (agent 直连任意 LLM 端点)。
tauri-plugin-http = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# 桌面自动更新 (移动端走应用商店, updater 仅桌面生效)。
[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-updater = "2"

[features]
# 默认生产关闭开发者工具; `cargo tauri dev` 自动开。
custom-protocol = ["tauri/custom-protocol"]
